        const userAnswers = {};

        function renderQuiz() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            quizData.forEach((q) => {
                const qDiv = document.createElement('div');
                qDiv.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-300";
                qDiv.id = `q-card-${q.id}`;

                let optionsHTML = '';
                q.options.forEach(opt => {
                    optionsHTML += `
                        <label class="flex items-start gap-3 p-3 rounded-lg border border-slate-200 cursor-pointer hover:bg-slate-50 transition-colors relative group">
                            <input type="radio" name="q-${q.id}" value="${opt.replace(/"/g, '&quot;')}" 
                                   onclick="selectAnswer(${q.id}, this.value)" 
                                   class="mt-1 h-4 w-4 text-teal-600 border-slate-300 focus:ring-teal-500">
                            <span class="text-sm font-medium text-slate-700 leading-tight">${opt}</span>
                        </label>
                    `;
                });

                qDiv.innerHTML = `
                    <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                        <h3 class="text-sm md:text-base font-bold text-slate-900 leading-snug">${q.id}. ${q.question}</h3>
                    </div>
                    <div class="p-4 space-y-2" id="options-container-${q.id}">
                        ${optionsHTML}
                    </div>
                    <div class="hidden px-4 py-3 bg-slate-50 border-t border-slate-100 flex flex-col gap-0.5 text-xs md:text-sm" id="feedback-${q.id}">
                    </div>
                `;
                container.appendChild(qDiv);
            });
            updateStats();
        }

        function selectAnswer(questionId, selectedValue) {
            userAnswers[questionId] = selectedValue;
            
            const question = quizData.find(q => q.id === questionId);
            const isCorrect = (selectedValue === question.correct);

            const card = document.getElementById(`q-card-${questionId}`);
            if (isCorrect) {
                card.className = "bg-white rounded-xl shadow-md border-l-4 border-l-emerald-500 border-slate-200 overflow-hidden transition-all duration-300";
            } else {
                card.className = "bg-white rounded-xl shadow-md border-l-4 border-l-rose-500 border-slate-200 overflow-hidden transition-all duration-300";
            }

            const feedbackArea = document.getElementById(`feedback-${questionId}`);
            feedbackArea.className = `px-4 py-3 border-t border-slate-100 flex flex-col text-xs md:text-sm ${isCorrect ? 'bg-emerald-50 text-emerald-800' : 'bg-rose-50 text-rose-800'}`;
            
            const statusText = isCorrect 
                ? `<span class="font-bold">✓ Prawidłowo!</span>` 
                : `<span class="font-bold">✗ Błąd merytoryczny. Poprawna odpowiedź: <u>${question.correct}</u></span>`;
            
            const explanationText = `<p class="mt-1 text-slate-600 italic bg-white/80 p-2 rounded border border-slate-200/50">${question.explanations[selectedValue]}</p>`;
            
            feedbackArea.innerHTML = statusText + explanationText;
            feedbackArea.style.display = 'flex';

            updateStats();
        }

        function updateStats() {
            const answeredCount = Object.keys(userAnswers).length;
            let correctCount = 0;

            quizData.forEach(q => {
                if (userAnswers[q.id] === q.correct) {
                    correctCount++;
                }
            });

            document.getElementById('stats-counter').innerText = `Rozwiązano: ${answeredCount} z ${quizData.length} pytań`;
            document.getElementById('score-display').innerText = `${correctCount} / ${quizData.length}`;
            
            const percentage = Math.round((answeredCount / quizData.length) * 100) || 0;
            const scorePercentage = Math.round((correctCount / quizData.length) * 100) || 0;
            document.getElementById('percent-display').innerText = `Postęp: ${percentage}% (Wynik: ${scorePercentage}%)`;
        }

        function showAllCorrectAnswers() {
            quizData.forEach(q => {
                const feedbackArea = document.getElementById(`feedback-${q.id}`);
                feedbackArea.className = "px-4 py-2 border-t border-slate-100 flex flex-col text-xs bg-emerald-50 text-emerald-800";
                feedbackArea.innerHTML = `<span class="font-bold">Poprawna odpowiedź: <u>${q.correct}</u></span>`;
                feedbackArea.style.display = 'flex';
                
                const card = document.getElementById(`q-card-${q.id}`);
                card.className = "bg-white rounded-xl shadow-md border-l-4 border-l-emerald-500 border-slate-200 overflow-hidden transition-all duration-300";
            });
        }

        function resetTest() {
            for (let key in userAnswers) {
                delete userAnswers[key];
            }
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = function() {
            renderQuiz();
        };
    </script>
